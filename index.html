<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">Dark Mode</button>
    <header>
        <h1>Lotto Number Generator</h1>
    </header>
    <main>
        <div id="lotto-container"></div>
        <button id="generate-btn">Generate Numbers</button>

        <section id="contact-section">
            <hr>
            <h2>제휴 문의 (Partnership)</h2>
            <form action="https://formspree.io/f/xwvwllqw" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">성함/기업명</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="제휴 내용을 입력해 주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
